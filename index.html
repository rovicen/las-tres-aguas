<script>
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const V = JSON.parse(document.getElementById('vault').textContent);
const pw = document.getElementById('pw'), go = document.getElementById('go'), err = document.getElementById('err');

async function decrypt(pass){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(V.salt), iterations:V.it, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(V.iv)}, key, b64(V.ct));
  return new TextDecoder().decode(pt);
}

async function unlock(pass, silent){
  go.disabled = true; go.textContent = 'Abriendo\u2026'; err.textContent = '';
  try{
    const html = await decrypt(pass);
    try{ sessionStorage.setItem('lda-key', pass); }catch(e){}
    const LOCK = `<style>#ldaLock:hover{box-shadow:0 0 18px rgba(201,165,92,.45);background:rgba(33,27,16,.94)}</style>` +
      `<div id="ldaLock" role="button" tabindex="0" aria-label="Cerrar el documento" title="Cerrar el documento \u2014 volver\u00e1 a pedir la llave" ` +
      `onclick="try{sessionStorage.removeItem('lda-key');sessionStorage.removeItem('lda-eje')}catch(e){};location.reload()" ` +
      `onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click()}" ` +
      `style="position:fixed;bottom:18px;right:18px;z-index:99999;font-family:Poppins,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#e9c682;background:rgba(23,19,12,.85);border:1px solid #c9a55c;border-radius:999px;padding:9px 16px;cursor:pointer;backdrop-filter:blur(4px);box-shadow:0 2px 14px rgba(0,0,0,.45);">&#10022; Salir</div>`;
    document.open(); document.write(html.replace('</body>', LOCK + '</body>')); document.close();
  }catch(e){
    try{ sessionStorage.removeItem('lda-key'); }catch(_){}
    go.disabled = false; go.textContent = 'Entrar';
    if(!silent){ err.textContent = 'Esa llave no abre este documento.'; pw.select(); }
  }
}

go.addEventListener('click', ()=>{ if(pw.value) unlock(pw.value, false); });
pw.addEventListener('keydown', e=>{ if(e.key==='Enter' && pw.value) unlock(pw.value, false); });
try{
  const saved = sessionStorage.getItem('lda-key');
  if(saved) unlock(saved, true);
}catch(e){}
</script>
</body>
</html>
